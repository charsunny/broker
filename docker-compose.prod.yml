# 生产部署 (dokploy)。
# - PostgreSQL / Redis 用阿里云托管服务, 通过 DATABASE_URL / REDIS_URL 环境变量配置
#   (不在此拉容器)。
# - 域名 / SSL 在 dokploy UI 里给 api / web / admin 各自配置 (本文件不写 Traefik labels)。
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      # 阿里云 RDS PostgreSQL (如需 SSL 在 URL 末尾加 ?sslmode=require)
      DATABASE_URL: ${DATABASE_URL:?set-aliyun-rds-postgres-url}
      # 阿里云 Redis (带密码: redis://:password@host:6379; 走 TLS 用 rediss://)
      REDIS_URL: ${REDIS_URL:?set-aliyun-redis-url}
      JWT_SECRET: ${JWT_SECRET:?set-a-strong-secret}
      JWT_EXPIRES_IN: 12h
      BROKER_PHONE_WHITELIST: ${BROKER_PHONE_WHITELIST:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      args:
        # 前端 API 基址在编译期注入 (= dokploy 里给 api 配的域名)
        API_BASE: ${WEB_API_BASE:-https://api.wxenv.com/api/v1}
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE: ${ADMIN_API_BASE:-https://api.wxenv.com/api/v1}
    restart: unless-stopped
