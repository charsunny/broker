# 生产部署 (dokploy)。
# - PostgreSQL / Redis 用阿里云托管服务, 通过 DATABASE_URL / REDIS_URL 环境变量配置
#   (不在此拉容器)。
# - 单域名 broker.wxenv.com + 路径代理, 在 dokploy UI 里配 (本文件不写 Traefik labels):
#     /      → web   (Broker Flutter, 端口 80)
#     /api   → api   (NestJS, 端口 3000; 不 strip 前缀, API 自身就在 /api/v1 下)
#     /admin → admin (端口 80; 不 strip 前缀, 已按 /admin/ base 打包)
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      # 阿里云 RDS PostgreSQL (如需 SSL 在 URL 末尾加 ?sslmode=require)
      DATABASE_URL: ${DATABASE_URL:?set-aliyun-rds-postgres-url}
      # 阿里云 Redis (带密码: redis://:password@host:6379; 走 TLS 用 rediss://)
      REDIS_URL: ${REDIS_URL:?set-aliyun-redis-url}
      JWT_SECRET: ${JWT_SECRET:?set-a-strong-secret}
      JWT_EXPIRES_IN: 12h
      BROKER_PHONE_WHITELIST: ${BROKER_PHONE_WHITELIST:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      args:
        # 前端 API 基址在编译期注入 (单域名 + /api 路径)
        API_BASE: ${WEB_API_BASE:-https://broker.wxenv.com/api/v1}
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE: ${ADMIN_API_BASE:-https://broker.wxenv.com/api/v1}
    restart: unless-stopped
