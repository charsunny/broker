server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # 挂在 broker.wxenv.com/admin 下 (dokploy 路由 /admin → 本服务, 不 strip 前缀)
  location = / {
    return 301 /admin/;
  }
  location = /admin {
    return 301 /admin/;
  }
  location /admin/ {
    # 资源命中文件; 其余路由回退到 admin/index.html (Vite SPA)
    try_files $uri $uri/ /admin/index.html;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
